<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - {{ site_name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="auth-wrapper">
    <div class="form-container" style="max-width:450px;">
        <div class="text-center" style="margin-bottom:25px;">
            <img src="{{ url_for('static', filename='images/logo-light.png') }}" alt="Akhgam" style="width:80px;height:80px;margin:0 auto 15px;display:block;">
            <h2 style="font-size:1.5rem;">Admin Panel</h2>
            <p class="form-subtitle">{{ site_name }} Administration</p>
        </div>

        {% if error %}
            <div class="alert alert-error"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
        {% endif %}

        <form method="POST" data-validate>
            <div class="form-group">
                <label>Admin Email</label>
                <div class="input-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" name="email" placeholder="Enter admin email" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="Enter admin password" required>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="fas fa-sign-in-alt"></i> Login as Admin
                </button>
            </div>
        </form>

        <p class="form-link mt-2"><a href="{{ url_for('index') }}"><i class="fas fa-arrow-left"></i> Back to Website</a></p>
    </div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
